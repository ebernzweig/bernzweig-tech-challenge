<h1 id="product-name">Super Widget</h1>

<p>
    Price: $<span id="product-price">19.99</span>
</p>

<button id="send-product">
    Send Product
</button>

<script>
window.dataLayer = window.dataLayer || [];

window.dataLayer.push({
    event: "productView",
    productName: document.getElementById("product-name").textContent,
    productPrice: document.getElementById("product-price").textContent
});

document.getElementById("send-product").addEventListener("click", function () {
    
    const product = dataLayer.find(function(item) {
    return item.event === "productView";
});

console.log(product);
});


</script>
